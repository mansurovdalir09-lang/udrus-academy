  <path d="M100 158 Q122 144 142 153" stroke="#C9A96E" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M100 158 Q126 140 148 151" stroke="#C9A96E" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Centre spine dot -->
