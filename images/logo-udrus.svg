<svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="u-cutout">
      <rect width="200" height="220" fill="white"/>
      <!-- Вырезаем букву U внутри круга -->
      <path d="M 72 50 L 72 105
               Q 72 128 100 128
               Q 128 128 128 105
               L 128 50
               L 116 50
               L 116 105
               Q 116 116 100 116
               Q 84 116 84 105
               L 84 50 Z"
            fill="black"/>
    </mask>
  </defs>

  <!-- Главный круг с вырезом U -->
  <circle cx="100" cy="95" r="72"
          fill="#C9A96E"
          mask="url(#u-cutout)"/>

  <!-- Раскрытая книга снизу — левое крыло -->
  <path d="M 28 125
           Q 50 160 98 168
           L 100 172
           L 100 155
           Q 60 148 38 128 Z"
        fill="#C9A96E"/>

  <!-- Правое крыло книги -->
  <path d="M 172 125
           Q 150 160 102 168
           L 100 172
           L 100 155
           Q 140 148 162 128 Z"
        fill="#C9A96E"/>

  <!-- Дополнительные линии страниц (глубина) -->
  <path d="M 42 140 Q 65 165 100 175"
        stroke="#C9A96E"
        stroke-width="6"
        fill="none"
        stroke-linecap="round"/>
  <path d="M 158 140 Q 135 165 100 175"
        stroke="#C9A96E"
        stroke-width="6"
        fill="none"
        stroke-linecap="round"/>
</svg>
