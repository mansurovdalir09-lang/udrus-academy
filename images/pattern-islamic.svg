<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="islamic" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- 8-pointed star -->
      <g fill="none" stroke="#C9A96E" stroke-width="0.8" opacity="0.6">
        <polygon points="50,10 58,35 85,35 63,51 71,76 50,60 29,76 37,51 15,35 42,35"/>
        <rect x="20" y="20" width="60" height="60" transform="rotate(45 50 50)"/>
        <circle cx="50" cy="50" r="18" fill="none"/>
        <line x1="50" y1="0" x2="50" y2="100"/>
        <line x1="0" y1="50" x2="100" y2="50"/>
        <line x1="0" y1="0" x2="100" y2="100"/>
        <line x1="100" y1="0" x2="0" y2="100"/>
      </g>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#islamic)"/>
</svg>
